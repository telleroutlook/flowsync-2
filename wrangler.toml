name = "chartsync-ai"
main = "worker/index.ts"
compatibility_date = "2025-02-04"
compatibility_flags = ["nodejs_compat_v2"]

[assets]
directory = "dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "chartsync"
database_id = "a6e22f05-b0f1-45b3-93aa-11991d2ccf10"
migrations_dir = "migrations_sqlite"

[vars]
OPENAI_BASE_URL = "https://open.bigmodel.cn/api/coding/paas/v4"
OPENAI_MODEL = "GLM-4.7"

# Browser Rendering API for chart screenshots
[browser]
binding = "BROWSER"

# R2 Storage for large file uploads
[[r2_buckets]]
binding = "R2"
bucket_name = "chartsync-uploads"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
